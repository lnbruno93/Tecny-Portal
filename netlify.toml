[build]
  base    = "frontend"
  # 2026-07-19 workaround preventivo del bug "Skip pristine deploys" de
  # Netlify — mismo issue documentado en `admin-frontend/netlify.toml`. En este
  # site (tecny-portal / tecnyapp.com) no se manifestó hoy porque los cambios
  # que le corresponden suelen tocar código de `frontend/src/` que sí altera
  # el `dist/` compilado. Pero un cambio SOLO en headers/CSP/redirects acá
  # (ej. un hotfix futuro donde solo se toca este `netlify.toml`) tendría el
  # mismo problema. El archivo `.build-timestamp.txt` con timestamp único
  # garantiza que Netlify siempre detecte content-change y aplique la config
  # nueva. Ver docs/NETLIFY_BUILDS.md para el detalle del bug + fix.
  command = "npm run build && date -u +%FT%TZ > dist/.build-timestamp.txt"
  publish = "dist"

# VITE_API_URL hardcoded acá (2026-07-04 P0). Antes vivía SOLO en Netlify UI
# → si alguien la borraba o cambiaba desde ahí, el bundle salía con el
# fallback prod duro del código (frontend/src/lib/api.js) sin que nadie se
# entere. Post-fix: la variable vive en el repo → cambio requiere commit
# visible + PR. Sin este cambio, el bug análogo al que rompió admin.tecnyapp.com
# hoy podía pasarle al portal también sin ser detectado.
#
# Contextos de Netlify:
#   [build.environment]                       → aplica a production (main)
#   [context.branch-deploy.environment]       → staging + otras branches
#   [context.deploy-preview.environment]      → PR previews
[build.environment]
  VITE_API_URL = "https://tecny-backend-production.up.railway.app"

# Service worker and PWA assets — no redirect, serve as-is
[[redirects]]
  from   = "/sw.js"
  to     = "/sw.js"
  status = 200

[[redirects]]
  from   = "/workbox-*.js"
  to     = "/workbox-:splat.js"
  status = 200

[[redirects]]
  from   = "/manifest.webmanifest"
  to     = "/manifest.webmanifest"
  status = 200

# Source maps: 404 directo, no SPA fallback. Vite genera los .map en build y
# el plugin Sentry los sube al proyecto Sentry (release tracking + stacktraces
# legibles para errors de producción), pero NO los publicamos en Netlify
# (evita que cualquiera con DevTools lea el código fuente original). Sin esta
# regla, el SPA fallback de abajo devolvería /index.html (HTML) cuando DevTools
# pide un .map, generando "JSON Parse error: Unrecognized token '<'" en la
# consola — molesto sin función rota. Con el 404 directo, DevTools recibe el
# status correcto y deja de quejarse.
[[redirects]]
  from   = "/assets/*.map"
  to     = "/404.html"
  status = 404

# SPA fallback — must come last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers globales para todo el frontend.
#
# Este block aplica en context production. En branch-deploy y deploy-preview,
# los context-specific blocks de más abajo REPLACE este block para /* (Netlify
# NO mergea — el block context-específico reemplaza por completo al global
# para los paths que matchea). Por eso esos blocks duplican todos los headers
# (HSTS, X-Frame-Options, etc.) — la única diferencia funcional es el
# `report-uri` del CSP, que apunta al backend del env (no cross-environment).
#
# hCaptcha (signup público anti-bot, PR #281):
#   - script-src: https://*.hcaptcha.com (carga /1/api.js + onload callback)
#   - frame-src: https://*.hcaptcha.com (challenge iframe + checkbox iframe)
#   - style-src: https://*.hcaptcha.com (estilos inyectados del widget)
#   - connect-src: https://*.hcaptcha.com (siteverify telemetry + sentry.hcaptcha.com)
# Ver https://docs.hcaptcha.com/#content-security-policy-settings.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Default CSP (production). Branch deploys override este header en su
    # context block para apuntar report-uri a backend-staging.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.hcaptcha.com; img-src 'self' data: blob: https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app https://*.hcaptcha.com; frame-src 'self' https://*.hcaptcha.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri https://tecny-backend-production.up.railway.app/api/csp-report"

# 2026-06-18 #308: CSP report-uri environment-aware.
# Antes el branch-deploy (staging frontend) posteaba reports a backend-prod
# → bloqueado por Cross-Origin-Resource-Policy (cross-env, distinto origen). Se
# veía como "Failed to load resource: tecny-backend-production.../api/csp-report"
# en la console del browser de staging. Ahora cada env reporta a su propio
# backend.
#
# IMPORTANTE: este block REPLACE los headers globales arriba para /* en el
# context branch-deploy. Debe DUPLICAR todos los demás headers (HSTS, etc.)
# porque Netlify no hace merge — un context-specific block reemplaza el
# global para los paths que matchea. Si solo pusiéramos CSP acá, perdiéramos
# HSTS / X-Frame-Options / etc. en staging.
[context.branch-deploy.environment]
  VITE_API_URL = "https://tecny-backend-staging.up.railway.app"

[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Mismo CSP que production EXCEPTO report-uri que apunta a staging backend.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.hcaptcha.com; img-src 'self' data: blob: https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app https://*.hcaptcha.com; frame-src 'self' https://*.hcaptcha.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri https://tecny-backend-staging.up.railway.app/api/csp-report"

# Deploy previews (PR builds): mismo CSP que branch-deploy (postear a staging
# backend tiene más sentido que a prod para previews — son entornos no-prod).
[context.deploy-preview.environment]
  VITE_API_URL = "https://tecny-backend-staging.up.railway.app"

[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.hcaptcha.com; img-src 'self' data: blob: https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app https://*.hcaptcha.com; frame-src 'self' https://*.hcaptcha.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri https://tecny-backend-staging.up.railway.app/api/csp-report"

# Headers for service worker scope and caching
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
