[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Service worker and PWA assets — no redirect, serve as-is
[[redirects]]
  from   = "/sw.js"
  to     = "/sw.js"
  status = 200

[[redirects]]
  from   = "/workbox-*.js"
  to     = "/workbox-:splat.js"
  status = 200

[[redirects]]
  from   = "/manifest.webmanifest"
  to     = "/manifest.webmanifest"
  status = 200

# Source maps: 404 directo, no SPA fallback. Vite genera los .map en build y
# el plugin Sentry los sube al proyecto Sentry (release tracking + stacktraces
# legibles para errors de producción), pero NO los publicamos en Netlify
# (evita que cualquiera con DevTools lea el código fuente original). Sin esta
# regla, el SPA fallback de abajo devolvería /index.html (HTML) cuando DevTools
# pide un .map, generando "JSON Parse error: Unrecognized token '<'" en la
# consola — molesto sin función rota. Con el 404 directo, DevTools recibe el
# status correcto y deja de quejarse.
[[redirects]]
  from   = "/assets/*.map"
  to     = "/404.html"
  status = 404

# SPA fallback — must come last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers globales para todo el frontend
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP del frontend, ajustada al build real (Vite, sin scripts inline) + Google Fonts.
    # connect-src incluye prod y staging (el branch deploy de staging pega al backend de staging).
    # report-uri: las browsers postean reports de violaciones de CSP a este endpoint
    # (apunta a prod; staging usa el mismo — el endpoint loguea con redacción).
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://ipro-backend-production.up.railway.app https://ipro-backend-staging.up.railway.app; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri https://ipro-backend-production.up.railway.app/api/csp-report"

# Headers for service worker scope and caching
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
