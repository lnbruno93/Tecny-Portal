# Netlify config — Tecny Admin (admin.tecnyapp.com).
#
# Site separado del portal principal (frontend/) por razones de seguridad:
# distinto dominio, distinto bundle, distinto CSP. Un compromiso en el portal
# público NO debería darle al atacante el código del admin app.
#
# Branch deploys de `staging` mapean al sub-dominio
# admin-staging.tecnyapp.com (configurar en Netlify UI). Production deploys
# de `main` mapean al sub-dominio admin.tecnyapp.com.

[build]
  base    = "admin-frontend"
  # 2026-07-19 hotfix workaround del bug "Skip pristine deploys" de Netlify.
  #
  # Contexto: Netlify tiene una feature que compara el `dist/` compilado con el
  # anterior y cancela el deploy si son idénticos ("Canceled build due to no
  # content change"). El problema: cambios en este `netlify.toml` (CSP, redirects,
  # headers) NO afectan el `dist/` de Vite → Netlify skipea el deploy → los
  # headers nuevos NUNCA se aplican. Bug reproducido con el PR #667: mergeamos
  # cambio de CSP a las 18:03 UTC, Netlify buildeó pero cancelo con "no content
  # change", el CSP viejo persistió en admin.tecnyapp.com hasta que hice
  # `netlify api createSiteBuild` manual.
  #
  # El workaround `date > dist/.build-timestamp.txt` agrega un archivo con
  # timestamp único a cada build → el `dist/` siempre difiere del anterior →
  # Netlify NUNCA skipea. Costo: ~30 bytes extra en el bundle publicado.
  # Beneficio: cualquier cambio en `netlify.toml` (CSP, redirects, headers,
  # env vars) queda aplicado tras el merge sin intervención manual.
  #
  # Truco canónico de la comunidad Netlify — hay hilos oficiales de discurso
  # que lo referencian como el fix estándar para el bug de skip-pristine.
  # Si Netlify saca en el futuro una opción para desactivar "skip pristine"
  # desde la config, este workaround puede reemplazarse por esa opción oficial.
  # Ver también: docs/NETLIFY_BUILDS.md.
  command = "npm run build && date -u +%FT%TZ > dist/.build-timestamp.txt"
  publish = "dist"

# VITE_API_URL — hardcoded acá para que NO dependa de la Netlify UI env vars
# (2026-07-04 P0: la var se perdió/cambió en la UI, el bundle se compiló
# con fallback a localhost → todo el admin en prod dejaba de conectar al
# backend con "Sin conexión con el servidor"). Tener esto en el repo garantiza
# que un rebuild siempre saca el bundle con la URL correcta, aunque alguien
# borre variables en Netlify UI. Los context blocks abajo overridean para
# staging/preview builds.
[build.environment]
  VITE_API_URL = "https://tecny-backend-production.up.railway.app"

# SPA fallback — react-router maneja todas las rutas internamente.
# Tiene que ser la ÚLTIMA redirect rule (Netlify procesa en orden).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers (production) ─────────────────────────────────────
#
# Stack mínimo necesario: noindex (admin no es público), HSTS, X-Frame-Options
# (clickjacking), CSP estricto.
#
# CSP rationale:
#   - script-src 'self' + https://*.hcaptcha.com. El endpoint público
#     /aceptar-invitacion (auditoría TOTAL Externa P1-1, 2026-07-12) tiene
#     un widget hCaptcha invisible para prevenir brute-force sobre el
#     espacio de tokens de invite (43 chars base64url). Antes acá decía
#     "NO usamos hCaptcha" — se cambió con el follow-up del audit. NO
#     usamos Google Tag Manager, NO usamos analytics externo.
#   - style-src 'self' + Google Fonts (Inter + JetBrains Mono via @import
#     en styles.css) + https://*.hcaptcha.com (widget inyecta estilos).
#     'unsafe-inline' necesario porque algunas primitivas usan
#     style={{...}} inline (a futuro se pueden mover a classes para sacar
#     el unsafe-inline).
#   - connect-src: Tecny backend (prod + staging — el bundle puede ir a
#     cualquiera según VITE_API_URL en build time, mantenemos ambos para
#     que no falle por config) + https://*.hcaptcha.com (siteverify
#     telemetry + sentry.hcaptcha.com).
#   - frame-src: https://*.hcaptcha.com (challenge iframe + checkbox
#     iframe del widget).
#   - frame-ancestors 'none' — admin NUNCA puede ser embed-eado en otro site.
#   - report-uri al backend prod por default; branch-deploy override abajo.
# Ver https://docs.hcaptcha.com/#content-security-policy-settings.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.hcaptcha.com; img-src 'self' data: https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app https://*.hcaptcha.com; frame-src 'self' https://*.hcaptcha.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri https://tecny-backend-production.up.railway.app/api/csp-report"

# ── Branch deploys (staging) ──────────────────────────────────────────
#
# Netlify NO mergea context blocks con el global — REPLACE para los paths
# que matchea. Replicamos todos los headers cambiando SOLO el report-uri
# (apunta a backend-staging en vez de prod). Misma razón que frontend/.
# En branch-deploy (staging), overrideamos VITE_API_URL para apuntar al
# backend de staging. Consistente con el override del report-uri en headers.
[context.branch-deploy.environment]
  VITE_API_URL = "https://tecny-backend-staging.up.railway.app"

[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.hcaptcha.com; img-src 'self' data: https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app https://*.hcaptcha.com; frame-src 'self' https://*.hcaptcha.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri https://tecny-backend-staging.up.railway.app/api/csp-report"

# ── Deploy previews (PRs) ─────────────────────────────────────────────
#
# Misma config que branch-deploy. Previews son entornos no-prod, reportan a
# staging backend.
# Deploy previews (PRs) también contra staging backend — mismo criterio.
[context.deploy-preview.environment]
  VITE_API_URL = "https://tecny-backend-staging.up.railway.app"

[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://*.hcaptcha.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.hcaptcha.com; img-src 'self' data: https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://tecny-backend-production.up.railway.app https://tecny-backend-staging.up.railway.app https://*.hcaptcha.com; frame-src 'self' https://*.hcaptcha.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri https://tecny-backend-staging.up.railway.app/api/csp-report"

# ── Cache headers ─────────────────────────────────────────────────────
#
# index.html — no cachear (siempre la última versión, esencial para que el
# user reciba el bundle nuevo al refresh post-deploy)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Assets con hash en el nombre (Vite genera `index-ABC123.js`) — cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
