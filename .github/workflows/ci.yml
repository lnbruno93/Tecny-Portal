name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ipro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ipro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Audit dependencies
        working-directory: backend
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
        run: npm run migrate

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          # Test-only key: 64 chars hex (32 bytes). NO usar en prod — la real
          # va por env var en Railway. Si falta, los tests de 2FA fallan en startup.
          TWOFA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NODE_ENV: test
        run: npm test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

      # TODO: agregar `npm run lint` aquí cuando se limpien los ~100 warnings
      # acumulados (catch sin uso, var sin uso). Follow-up de la auditoría ultra.

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build (smoke test)
        working-directory: frontend
        run: npm run build
