name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Sprint 3 L1 (roadmap post-auditoría 2026-07-19). Fast infra-linting job
  # (~5s): asserta paridad de CSP entre netlify.toml root y admin, previniendo
  # la clase de bug del 2026-07-19 (admin's CSP tenía `img-src 'self' data:`
  # sin las backend URLs → logos del carrusel Empresas 404 en admin.tecnyapp.com).
  # Sin services, sin build — solo lee 2 files + assertions. Corre en paralelo
  # con el resto, no bloquea nada.
  csp-parity:
    name: CSP parity (netlify.toml)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Los tests del parser + el verify usan solo el built-in `node:test` y
      # `fs`. No requerimos `npm ci` en root porque scripts/security/* no importa
      # ninguna dependency de node_modules. Ahorramos ~30s por run.
      - name: Run parser unit tests
        run: npm run test:csp

      - name: Verify CSP parity between netlify.toml files
        run: npm run verify:csp

  # Rec #6 audit 2026-07-20 Fase 1: anti-regression check de inline styles.
  # Cuenta `style={}` en frontend + admin-frontend y compara con baseline.
  # Falla si un PR agrega inline styles nuevos (que forzarían mantener
  # `unsafe-inline` en style-src del CSP). Fase 2 (semanas, futuro): migrar
  # los existentes en batches; cuando llegue a 0, remover `unsafe-inline`.
  #
  # Corre sin services + sin npm ci — el script usa solo Node built-in fs.
  # Job independiente de csp-parity porque son verificaciones distintas
  # (una lee netlify.toml, la otra escanea JSX) — fail separado da mejor
  # señal en la UI de PR.
  csp-inline-styles:
    name: CSP inline styles anti-regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check inline style count vs baseline
        run: node scripts/csp-inline-styles-check.mjs check

  # 2026-07-24 (P0 combo post-Sentry #16/#17): anti-regression para patterns
  # peligrosos en backend/src/. Escanea buscando `SET LOCAL ... = ${...}` con
  # interpolación NO validada (bug que disparó Sentry #17 en redB2bEmail.js),
  # `eval()` / `new Function()` en el backend, y `current_setting(...)::int`
  # sin NULLIF (bug Sentry #16). Compara contra baseline JSON — falla si un
  # archivo introduce nuevos matches.
  #
  # Sin services + sin npm ci — script usa solo Node built-in fs. ~1s de run.
  backend-anti-regression:
    name: Backend anti-regression (SQL injection / eval / RLS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check backend patterns vs baseline
        run: npm run check:backend-anti-regression

  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ipro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ipro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Audit dependencies
        working-directory: backend
        # --omit=dev: las devDependencies (jest, babel, supertest, etc.) NO van
        # a runtime de producción, por lo tanto sus vulns transitivas no son
        # explotables en el server vivo. Auditamos solo runtime deps. Las
        # vulns en dev se chequean manualmente y se accionan con upgrades.
        run: npm audit --audit-level=moderate --omit=dev

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
        run: npm run migrate

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          # Test-only key: 64 chars hex (32 bytes). NO usar en prod — la real
          # va por env var en Railway. Si falta, los tests de 2FA fallan en startup.
          TWOFA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          # 2026-07-12 (auditoría TOTAL Plataforma P1-3): forzar la
          # instrumentación pg_strtoint en tests. En prod queda OFF por
          # default (elimina overhead baseline); en tests queda ON para
          # verificar el wrapper en `database-instrumentation.test.js`.
          # Idem setEnv.js para tests locales.
          DB_INT_CAST_DEBUG: '1'
          NODE_ENV: test
        # T4 auditoría 2026-06: corremos con --coverage para que jest gatee
        # los thresholds configurados en jest.config.js. Un PR que baje la
        # cobertura por debajo del baseline rompe CI.
        run: npm test -- --coverage

  # 2026-07-12 (auditoría TOTAL Plataforma P1-2):
  # Job dedicado que corre un test suite mínimo con pool conectado DIRECTAMENTE
  # como NOSUPERUSER (rol `ipro_app`), replicando la condición prod donde
  # DATABASE_URL apunta al role sin BYPASSRLS.
  #
  # Motivación: el job `test` de arriba corre con el rol `ipro` superuser
  # default de Postgres Docker → bypassea RLS incluso con FORCE. Cualquier
  # migration futura con backfill sin `SET LOCAL app.current_tenant` sobre
  # tabla FORCE RLS puede pasar CI y romper prod (exactamente el incident
  # F1 del 2026-07-09). Este job cierra ese gap.
  #
  # NO reemplaza al `test` — corre en paralelo, mismo Postgres, pero con
  # `ipro_app` como user. Es rápido (< 30s) porque solo corre 6 tests smoke
  # (fail-closed sin tenant + FORCE RLS coverage + INSERT rechazado).
  nosuperuser-rls:
    name: NOSUPERUSER RLS Tests
    runs-on: ubuntu-latest
    needs: test  # solo corre si el job normal pasó (evita duplicar tiempo si test rompió)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ipro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ipro_nosuperuser
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations (as superuser)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_nosuperuser
        run: npm run migrate

      - name: Setup ipro_app NOSUPERUSER role + grants
        working-directory: backend
        env:
          PGPASSWORD: testpass
        # Aplica el mismo setup que prod (scripts/setup-app-role.sql) para
        # crear el role NOSUPERUSER con grants sobre las tablas existentes.
        run: psql -h localhost -U ipro -d ipro_nosuperuser -v ON_ERROR_STOP=1 -f scripts/ci-setup-app-role.sql

      - name: Run NOSUPERUSER pool tests
        working-directory: backend
        env:
          # Este es el gate: connection string con ipro_app en vez del user
          # superuser. El test suite lee DATABASE_URL_NOSUPERUSER; sin la
          # var, se skipea (así el job local corre igual sin romperse).
          DATABASE_URL_NOSUPERUSER: postgresql://ipro_app:ci_test_password_not_for_prod@localhost:5432/ipro_nosuperuser
          # DATABASE_URL sigue apuntando al superuser porque setupTestDb
          # necesita permisos DDL para las tablas temporales. Solo el pool
          # del test file nuevo usa DATABASE_URL_NOSUPERUSER directamente.
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_nosuperuser
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          TWOFA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NODE_ENV: test
        run: npx jest tests/nosuperuser-pool-real.test.js --runInBand

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: frontend
        # 2026-07-21: --omit=dev para no fallar por vulns en build tools (sharp/
        # vite-pwa/assets-generator). Runtime deps son las que importan para
        # el bundle que servimos al user. Match backend approach.
        run: npm audit --audit-level=moderate --omit=dev

      # Lint (T5 auditoría 2026-06): activado, rechaza solo ERRORS (no warnings).
      # Los warnings acumulados (~120) son señales útiles pero no bloqueantes —
      # bajarlos gradualmente en próximas tandas. Los errors SIEMPRE fallan CI.
      - name: Lint
        working-directory: frontend
        run: npm run lint

      # 2026-06-11 M-07: type-check incremental. Solo valida `.ts/.tsx` (checkJs:
      # false en tsconfig) — los `.js/.jsx` no bloquean. A medida que se migran
      # archivos a TS, cada uno entra al gate sin que lo legacy rompa CI.
      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build (smoke test)
        working-directory: frontend
        run: npm run build

  admin-frontend-test:
    # REP-1 (auditoría pre-live 2026-06): admin-frontend tenía paridad de stack
    # con frontend (Vite + Vitest + React + ESLint) pero ningún job de CI lo
    # cubría — un PR podía romper la consola admin sin que CI lo detectara.
    # Mismas steps que frontend-test pero contra admin-frontend/.
    name: Admin Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install dependencies
        working-directory: admin-frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: admin-frontend
        # 2026-07-21: --omit=dev para match frontend/backend approach.
        run: npm audit --audit-level=moderate --omit=dev

      - name: Lint
        working-directory: admin-frontend
        run: npm run lint

      - name: Run admin-frontend tests
        working-directory: admin-frontend
        run: npm test

      - name: Build (smoke test)
        working-directory: admin-frontend
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # REP-6 (auditoría pre-live 2026-06): E2E ahora es required gate. Antes
    # tenía `continue-on-error: true` como soft-gate "mientras estabilizamos
    # timings". 10 specs (1518 LOC) maintained activamente + 9 PRs de fix
    # entre 2026-06-10 y 2026-06-17 — los breakages ya están remediados. Si
    # un test flakea post-merge, el fix correcto es el test (no re-enable del
    # bypass). Branch protection en GitHub: marcar este job como required.

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ipro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ipro_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cacheamos node_modules de los 3 lugares (root para Playwright, backend
      # para el server, frontend para Vite). Sin esto cada run baja ~250MB.
      - name: Install root deps (Playwright)
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Cache de browsers de Playwright — pesado (~150MB). La key incluye la
      # versión exacta de @playwright/test para que un bump invalide el cache.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (always — fast no-op if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E suite
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_e2e
          JWT_SECRET: ci-e2e-test-jwt-secret-not-for-production-min-32
          TWOFA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NODE_ENV: test
          CI: 'true'
        run: npm run e2e

      # Artifacts en failure: trace, screenshots, video, HTML report.
      # Necesario para diagnosticar fallos remotos que no se reproducen local.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (traces + screenshots + videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
