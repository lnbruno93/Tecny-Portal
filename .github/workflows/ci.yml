name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ipro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ipro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
        run: npm run migrate

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          NODE_ENV: test
        run: npm test
