name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ipro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ipro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Audit dependencies
        working-directory: backend
        # --omit=dev: las devDependencies (jest, babel, supertest, etc.) NO van
        # a runtime de producción, por lo tanto sus vulns transitivas no son
        # explotables en el server vivo. Auditamos solo runtime deps. Las
        # vulns en dev se chequean manualmente y se accionan con upgrades.
        run: npm audit --audit-level=moderate --omit=dev

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
        run: npm run migrate

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_test
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          # Test-only key: 64 chars hex (32 bytes). NO usar en prod — la real
          # va por env var en Railway. Si falta, los tests de 2FA fallan en startup.
          TWOFA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NODE_ENV: test
        # T4 auditoría 2026-06: corremos con --coverage para que jest gatee
        # los thresholds configurados en jest.config.js. Un PR que baje la
        # cobertura por debajo del baseline rompe CI.
        run: npm test -- --coverage

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: frontend
        run: npm audit --audit-level=moderate

      # Lint (T5 auditoría 2026-06): activado, rechaza solo ERRORS (no warnings).
      # Los warnings acumulados (~120) son señales útiles pero no bloqueantes —
      # bajarlos gradualmente en próximas tandas. Los errors SIEMPRE fallan CI.
      - name: Lint
        working-directory: frontend
        run: npm run lint

      # 2026-06-11 M-07: type-check incremental. Solo valida `.ts/.tsx` (checkJs:
      # false en tsconfig) — los `.js/.jsx` no bloquean. A medida que se migran
      # archivos a TS, cada uno entra al gate sin que lo legacy rompa CI.
      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build (smoke test)
        working-directory: frontend
        run: npm run build

  admin-frontend-test:
    # REP-1 (auditoría pre-live 2026-06): admin-frontend tenía paridad de stack
    # con frontend (Vite + Vitest + React + ESLint) pero ningún job de CI lo
    # cubría — un PR podía romper la consola admin sin que CI lo detectara.
    # Mismas steps que frontend-test pero contra admin-frontend/.
    name: Admin Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Install dependencies
        working-directory: admin-frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: admin-frontend
        run: npm audit --audit-level=moderate

      - name: Lint
        working-directory: admin-frontend
        run: npm run lint

      - name: Run admin-frontend tests
        working-directory: admin-frontend
        run: npm test

      - name: Build (smoke test)
        working-directory: admin-frontend
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # REP-6 (auditoría pre-live 2026-06): E2E ahora es required gate. Antes
    # tenía `continue-on-error: true` como soft-gate "mientras estabilizamos
    # timings". 10 specs (1518 LOC) maintained activamente + 9 PRs de fix
    # entre 2026-06-10 y 2026-06-17 — los breakages ya están remediados. Si
    # un test flakea post-merge, el fix correcto es el test (no re-enable del
    # bypass). Branch protection en GitHub: marcar este job como required.

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ipro
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: ipro_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cacheamos node_modules de los 3 lugares (root para Playwright, backend
      # para el server, frontend para Vite). Sin esto cada run baja ~250MB.
      - name: Install root deps (Playwright)
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Cache de browsers de Playwright — pesado (~150MB). La key incluye la
      # versión exacta de @playwright/test para que un bump invalide el cache.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (always — fast no-op if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E suite
        env:
          DATABASE_URL: postgresql://ipro:testpass@localhost:5432/ipro_e2e
          JWT_SECRET: ci-e2e-test-jwt-secret-not-for-production-min-32
          TWOFA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NODE_ENV: test
          CI: 'true'
        run: npm run e2e

      # Artifacts en failure: trace, screenshots, video, HTML report.
      # Necesario para diagnosticar fallos remotos que no se reproducen local.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (traces + screenshots + videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
