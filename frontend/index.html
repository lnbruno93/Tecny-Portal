<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <meta name="theme-color" content="#0a0e18" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tecny" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- SEO / Social (UX-1/31 audit 2026-06-22) -->
    <!-- tecnyapp.com es la landing pre-signup. Sin estos tags, los previews
         de WhatsApp/Slack/Twitter/LinkedIn salen vacíos o con el HTML
         scrapeado a ciegas. Google también pierde contexto para el SERP. -->
    <title>Tecny — el SaaS para revendedores de tecnología</title>
    <meta name="description" content="Cotizaciones, comprobantes, cuentas corrientes, envíos y caja — todo en un mismo portal. Probá 14 días gratis sin tarjeta." />
    <link rel="canonical" href="https://tecnyapp.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tecnyapp.com/" />
    <meta property="og:title" content="Tecny — el SaaS para revendedores de tecnología" />
    <meta property="og:description" content="Cotizaciones, comprobantes, cuentas corrientes, envíos y caja — todo en un mismo portal. Probá 14 días gratis sin tarjeta." />
    <meta property="og:image" content="https://tecnyapp.com/og-cover.png" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:site_name" content="Tecny" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tecny — el SaaS para revendedores de tecnología" />
    <meta name="twitter:description" content="Cotizaciones, comprobantes, cuentas corrientes, envíos y caja — todo en un mismo portal." />
    <meta name="twitter:image" content="https://tecnyapp.com/og-cover.png" />

    <!-- Si og-cover.png aún no existe en /public, el preview va a fallback al
         favicon en algunos clients. Cuando Lucas suba la imagen oficial
         (1200x630 PNG/JPG recomendado), el preview se ve completo. -->


    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width: 480px; margin: 80px auto; padding: 24px; font-family: -apple-system, system-ui, sans-serif; color: #e2e6f0; background: #131a2b; border-radius: 12px; text-align: center;">
        <h1 style="margin: 0 0 12px; font-size: 22px;">Tecny requiere JavaScript</h1>
        <p style="margin: 0; color: #7c87a5; line-height: 1.6;">
          Por seguridad y para que la app funcione (validaciones, OCR, modales, etc.), JavaScript debe estar habilitado en tu navegador. Activalo y recargá la página.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
